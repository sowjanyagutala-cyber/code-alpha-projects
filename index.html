<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery | CodeAlpha Task 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Image Gallery</h1>
        <p>Responsive Lightbox Gallery</p>
    </header>

    <main class="gallery-container">
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500" alt="Nature 1" onclick="openLightbox(0)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500" alt="Nature 2" onclick="openLightbox(1)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500" alt="Nature 3" onclick="openLightbox(2)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=500" alt="Nature 4" onclick="openLightbox(3)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=500" alt="Nature 5" onclick="openLightbox(4)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=500" alt="Nature 6" onclick="openLightbox(5)"></div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <span class="prev" onclick="changeImage(-1)">&#10094;</span>
        <img id="lightbox-img" src="" alt="Full View">
        <span class="next" onclick="changeImage(1)">&#10095;</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
